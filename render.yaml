# Render Blueprint for CLT Trading Journal
# Docs: https://render.com/docs/blueprint-spec
#
# One-click deploy: in the Render dashboard choose "New +" -> "Blueprint",
# connect this GitHub repo, and Render provisions the web service plus a
# managed Postgres database and wires them together automatically.

# Preview environments: every pull request gets its own full copy of these
# services + a fresh database at a unique *.onrender.com URL, so changes can be
# reviewed live before merging. (Preview envs use the service's instance type.)
previews:
  generation: automatic

databases:
  - name: clt-tj-db
    databaseName: clt_tj
    user: clt_tj
    plan: free

services:
  - type: web
    name: clt-tj
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      # Strong random secret generated by Render (never commit real secrets).
      - key: SECRET_KEY
        generateValue: true
      # Injected from the managed Postgres database above.
      - key: DATABASE_URL
        fromDatabase:
          name: clt-tj-db
          property: connectionString
      # SPA is served same-origin by the API, so CORS is permissive by default.
      - key: CORS_ORIGINS
        value: "*"
      # FRONTEND_URL is intentionally unset — the app falls back to
      # RENDER_EXTERNAL_URL, so email links point at prod OR the preview URL.

      # --- Email via SendGrid SMTP relay ---
      - key: SMTP_HOST
        value: smtp.sendgrid.net
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: apikey  # SendGrid's fixed SMTP username; the API key is the password
      - key: SMTP_TLS
        value: "true"
      # Must be a Verified Sender / authenticated domain in SendGrid.
      - key: SMTP_FROM
        value: CLT Trading Journal <no-reply@example.com>
      # SECRET: set this in the Render dashboard, never in git.
      - key: SMTP_PASSWORD
        sync: false
